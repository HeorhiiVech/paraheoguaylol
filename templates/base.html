<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeoHub — {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root {
            --bg: #0d0d10;
            --panel: #16161b;
            --panel-2: #1d1d24;
            --border: #2a2a33;
            --gold: #f1c40f;
            --blue: #3498db;
            --red: #e74c3c;
            --green: #2ecc71;
            --muted: #d8d8de;
        }
        html { font-size: 20px; }
        body { background: var(--bg); color: #f2f2f5; font-size: 0.85rem; }
        .text-muted { color: #c6c6cf !important; }
        .navbar-scout { background: var(--panel); border-bottom: 1px solid var(--border); }
        .navbar-scout .brand { color: var(--gold); font-weight: 800; letter-spacing: 1px; font-size: 1.25rem; }
        .nav-link { color: #d2d2da; font-weight: 600; font-size: 0.95rem; }
        .nav-link:hover { color: #fff; }
        .nav-link.active { color: var(--gold); }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; }
        .roster-tag { font-size: 0.6rem; background: var(--gold); color: #000; font-weight: 700;
            padding: 0 4px; border-radius: 3px; vertical-align: middle; margin-left: 4px; }
        .p-name { color: #f2f2f5; text-decoration: none; font-weight: 600; }
        .p-name:hover { color: var(--gold); }
        .p-name.roster { color: var(--gold); }
        .wr-high { color: var(--green); font-weight: 700; }
        .wr-low { color: var(--red); font-weight: 700; }
        .obj-pill { display:inline-flex; align-items:center; gap:3px; font-size:0.72rem;
            background: var(--panel-2); border:1px solid var(--border); border-radius:12px;
            padding:1px 7px; color:#f2f2f5; }
        .obj-pill b { color:#fff; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-scout px-3 py-2 mb-3">
        <span class="brand">HEO<span style="color:#fff">HUB</span></span>
        <div class="nav">
            <a class="nav-link {% block nav_history %}{% endblock %}" href="/">Match History</a>
            <a class="nav-link {% block nav_players %}{% endblock %}" href="/players">Players</a>
            <a class="nav-link {% block nav_team %}{% endblock %}" href="/team">Team Stats</a>
            <a class="nav-link {% block nav_draft %}{% endblock %}" href="/draft">Draft Board</a>
        </div>
    </nav>
    <div class="container-fluid px-3 pb-5">
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
